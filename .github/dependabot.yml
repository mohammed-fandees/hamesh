version: 2
updates:
  # npm / pnpm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    groups:
      # Batch low-risk minor/patch bumps into a single PR to reduce noise.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    commit-message:
      prefix: 'chore(deps)'

  # GitHub Actions used in workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(ci)'
